mcs.metadata:
  componentName: Online Research
  description: Performs live online research. This topic exists as a routing hint. The actual capability is provided by the agent native webBrowsing setting.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Online Research
    includeInOnSelectIntent: false
    triggerQueries:
      - Research this topic
      - Search the web for
      - Look up online
      - Find information about
      - What is the latest on
      - Current news about
  actions:
    - kind: SearchAndSummarizeContent
      id: search_web_research
      variable: Topic.Answer
      userInput: =System.Activity.Text
    - kind: ConditionGroup
      id: conditionGroup_hasAnswer
      conditions:
        - id: conditionItem_hasAnswer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: SendActivity
              id: sendMessage_research_result
              activity:
                text:
                  - "{Topic.Answer}"
      elseActions:
        - kind: SendActivity
          id: sendMessage_research_fallback
          activity:
            text:
              - "I was not able to find specific information on that topic. Could you rephrase your question?"
    - kind: CancelAllDialogs
      id: cancelAllDialogs_or01
